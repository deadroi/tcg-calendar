  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    html, body { width: 100%; height: 100%; background: #0a0a12; color: #eee; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

    /* ===== SELECT SCREEN ===== */
    #select-screen {
      display: flex; flex-direction: column;
      width: 100vw; height: 100dvh;
      background: #0d0d1a;
    }

    .top-header {
      flex-shrink: 0;
      padding: 10px 14px 6px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #2a2a4a;
    }
    .top-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-header-text h1 {
      font-size: 16px; font-weight: 700; letter-spacing: 2px;
      color: #c0a060; text-transform: uppercase;
    }
    .top-header-text p { font-size: 11px; color: #666; margin-top: 2px; }
    #btn-fullscreen {
      background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7); border-radius: 8px;
      width: 36px; height: 36px; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    #btn-fullscreen:active { background: rgba(255,255,255,0.18); }

    /* Attribute tabs */
    .attr-tabs {
      display: flex; flex-shrink: 0;
      background: #111120; border-bottom: 1px solid #222240;
      overflow-x: auto;
    }
    .attr-tabs::-webkit-scrollbar { display: none; }
    .attr-tab {
      flex: 1; min-width: 56px; padding: 9px 4px;
      text-align: center; font-size: 12px; font-weight: 600;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: all 0.2s; white-space: nowrap; color: #666;
      user-select: none;
    }
    .attr-tab .tab-icon { font-size: 15px; display: block; line-height: 1; }
    .attr-tab .tab-name { font-size: 10px; margin-top: 2px; }
    .attr-tab.active { border-bottom-color: var(--c); color: var(--c); background: rgba(255,255,255,0.04); }

    /* Card grid */
    .card-grid {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      display: grid; grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: calc((100vw - 36px) / 3 * 63 / 88);
      gap: 8px; padding: 10px;
    }
    .card-grid::-webkit-scrollbar { width: 4px; }
    .card-grid::-webkit-scrollbar-track { background: transparent; }
    .card-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .card-item {
      aspect-ratio: 88 / 63; border-radius: 6px;
      overflow: hidden; cursor: pointer;
      background: #1a1a2e; border: 2px solid #2a2a4a;
      transition: transform 0.12s, border-color 0.2s;
      position: relative;
    }
    .card-item:active { transform: scale(0.93); }
    .card-item.has-img { border-color: var(--c); }
    .card-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #111120);
      padding: 4px;
    }
    .card-placeholder .ph-icon { font-size: 18px; opacity: 0.35; }
    .card-placeholder .ph-no { font-size: 7px; color: #333; margin-top: 3px; }
    .card-name-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.88));
      font-size: 8.5px; text-align: center; padding: 10px 3px 3px;
      color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-item.has-img .card-name-bar { color: #fff; }

    /* ===== DISPLAY SCREEN ===== */
    #display-screen {
      display: none; position: fixed; inset: 0;
      background: #000; align-items: center; justify-content: center;
      flex-direction: column;
    }
    #display-screen.active { display: flex; }

    #card-wrap {
      position: relative;
      width: min(100vw, calc(100dvh * 88 / 63));
      height: min(calc(100vw * 63 / 88), 100dvh);
      max-width: 100vw; max-height: 100dvh;
    }

    #card-img-el {
      width: 100%; height: 100%;
      display: block; border-radius: 4px;
      object-fit: cover;
    }
    #card-placeholder-el {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #111120);
      border-radius: 4px;
    }
    #card-placeholder-el .ph-name {
      font-size: clamp(16px, 4vw, 26px); font-weight: 700;
      color: #555; text-align: center; padding: 0 20px;
    }
    #card-placeholder-el .ph-sub {
      font-size: clamp(10px, 2.5vw, 14px); color: #333; margin-top: 6px;
    }

    /* Level UI overlay */
    #level-ui {
      position: absolute; top: 6px; right: 6px;
      display: flex; flex-direction: column; align-items: flex-end;
      z-index: 10; pointer-events: none;
    }
    #level-label {
      font-size: 10px; font-weight: 800; letter-spacing: 2px;
      color: rgba(255,220,80,0.9);
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      line-height: 1;
    }
    #level-num {
      font-size: clamp(44px, 14vw, 80px); font-weight: 900;
      color: #FFD700; line-height: 1; margin-top: 1px;
      text-shadow: 0 0 12px rgba(255,180,0,0.6), 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    }
    #level-btns {
      display: flex; flex-direction: column; gap: 5px; margin-top: 5px; pointer-events: all;
    }
    .lv-btn {
      width: clamp(45px, 13.5vw, 61px); height: clamp(45px, 13.5vw, 61px);
      background: rgba(0,0,0,0.3); border: 1.5px solid rgba(255,215,0,0.4);
      border-radius: 50%; color: rgba(255,215,0,0.9);
      font-size: clamp(25px, 8.1vw, 36px); font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, transform 0.1s;
      user-select: none;
    }
    .lv-btn:active { background: rgba(255,215,0,0.25); transform: scale(0.9); }

    /* 각성 표시 */
    #awaken-badge {
      font-size: 12px; font-weight: 900; letter-spacing: 1px;
      padding: 2px 8px; border-radius: 8px;
      background: rgba(180,100,255,0.88); color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      display: none;
    }
    #awaken-badge.active { display: inline-block; }

    /* 효과 오버레이 (하단) */
    #effect-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.82);
      max-height: 55%; overflow-y: auto;
      padding: 6px 10px 8px;
    }
    #effect-overlay::-webkit-scrollbar { width: 3px; }
    #effect-overlay::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    #effect-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 5px;
    }
    #effect-label {
      font-size: 9px; font-weight: 800; letter-spacing: 2px;
      padding: 2px 7px; border-radius: 8px; color: #fff;
    }
    #effect-label.basic  { background: rgba(100,160,255,0.7); }
    #effect-label.awaken { background: rgba(180,100,255,0.8); }
    #disp-attr-badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 8px;
      color: #fff; opacity: 0.85; white-space: nowrap; flex-shrink: 0;
    }
    #effect-text {
      font-size: clamp(13px, 3.6vw, 17px); line-height: 1.6;
      color: #ddd; white-space: pre-wrap; word-break: keep-all;
    }

    /* Back button */
    #btn-back {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 7px 14px;
      font-size: 13px; cursor: pointer; z-index: 200;
      transition: background 0.15s;
    }
    #btn-back:active { background: rgba(255,255,255,0.15); }

    .site-footer {
      flex-shrink: 0;
      padding: 6px 10px;
      text-align: center;
      font-size: 9px; color: #888; line-height: 1.5;
      border-top: 1px solid #1a1a2e;
    }
  </style>
</head>

  </div>

    </div>

      <div id="effect-header">

const MAX_LEVEL = 10;
const MIN_LEVEL = 1;
let currentAttr = 0;
let currentLevel = 1;
let currentAwLv = 5;



// ===== 선택 화면 =====
function buildAttrTabs() {
  const container = document.getElementById('attr-tabs');
  ATTRS.forEach((a, i) => {
    const tab = document.createElement('div');
    tab.className = 'attr-tab' + (i === currentAttr ? ' active' : '');
    tab.style.setProperty('--c', a.color);
    const cnt = CARDS.filter(c => c.attr === i).length;
    tab.innerHTML = `<span class="tab-icon">${a.icon}</span><span class="tab-name">${a.name} (${cnt})</span>`;
    tab.onclick = () => selectAttr(i);
    container.appendChild(tab);
  });
}

function buildCardGrid() {
  const container = document.getElementById('card-grid');
  container.innerHTML = '';
  CARDS.forEach((card, idx) => {
    if (card.attr !== currentAttr) return;
    const item = document.createElement('div');
    item.className = 'card-item' + (card.img ? ' has-img' : '');
    item.style.setProperty('--c', ATTRS[card.attr].color);
    if (card.img) {
      const img = document.createElement('img');
      img.style.cssText = 'width:100%;height:100%;display:block;border-radius:4px;object-fit:cover;';
      img.alt = card.name;
      item.appendChild(img);
      new IntersectionObserver((entries, obs) => {
        if (entries[0].isIntersecting) {
          obs.disconnect();
          img.src = card.img;
        }
      }, { threshold: 0.1 }).observe(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-placeholder';
      ph.innerHTML = `<div class="ph-icon">${ATTRS[card.attr].icon}</div><div class="ph-no">${card.no}</div>`;
      item.appendChild(ph);
    }
    const nameBar = document.createElement('div');
    nameBar.className = 'card-name-bar';
    nameBar.textContent = card.name;
    item.appendChild(nameBar);
    item.onclick = () => openCard(idx);
    container.appendChild(item);
  });
}

function selectAttr(idx) {
  currentAttr = idx;
  document.querySelectorAll('.attr-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  buildCardGrid();
}

// ===== 카드 표시 =====
let currentCard = null;

function openCard(cardIdx) {
  currentCard = CARDS[cardIdx];
  const attr = ATTRS[currentCard.attr];
  currentLevel = 1;
  currentAwLv = currentCard.awLv;

  const imgEl = document.getElementById('card-img-el');
  const phEl  = document.getElementById('card-placeholder-el');
  if (currentCard.img) {
    imgEl.style.display = 'block'; phEl.style.display = 'none';
    imgEl.src = currentCard.img;
  } else {
    imgEl.style.display = 'none'; phEl.style.display = 'flex';
    document.getElementById('ph-name-text').textContent = currentCard.name;
    document.getElementById('ph-sub-text').textContent = attr.icon + ' ' + attr.name + '  |  각성 Lv.' + currentCard.awLv;
  }

  const badge = document.getElementById('disp-attr-badge');
  badge.textContent = attr.icon + ' ' + attr.name;
  badge.style.background = attr.color;

  document.getElementById('display-screen').classList.add('active');
  document.getElementById('select-screen').style.display = 'none';
  updateLevelDisplay();
}

function goBack() {
  document.getElementById('display-screen').classList.remove('active');
  document.getElementById('select-screen').style.display = '';
}

// ===== 레벨 조절 =====
function changeLevel(delta) {
  currentLevel = Math.max(MIN_LEVEL, Math.min(MAX_LEVEL, currentLevel + delta));
  updateLevelDisplay();
}

function updateLevelDisplay() {
  document.getElementById('level-num').textContent = currentLevel;
  document.getElementById('btn-minus').style.opacity = currentLevel <= MIN_LEVEL ? '0.3' : '1';
  document.getElementById('btn-plus').style.opacity  = currentLevel >= MAX_LEVEL ? '0.3' : '1';

  const awakened = currentLevel >= currentAwLv;

  // 각성 배지
  document.getElementById('awaken-badge').classList.toggle('active', awakened);

  // 효과 텍스트 전환
  if (currentCard) {
    const text  = document.getElementById('effect-text');
    const overlay = document.getElementById('effect-overlay');
    if (awakened) {
      text.textContent = currentCard.awaken || '';
    } else {
      text.textContent = currentCard.basic || '';
    }
    overlay.scrollTop = 0;
  }
}

// ===== 초기화 =====
buildAttrTabs();
buildCardGrid();
updateLevelDisplay();

window.addEventListener('popstate', () => {
  if (document.getElementById('display-screen').classList.contains('active')) goBack();
});

document.addEventListener('contextmenu', e => e.preventDefault());

// ===== 전체화면 =====
function toggleFullscreen() {
  const btn = document.getElementById('btn-fullscreen');
  if (!document.fullscreenElement) {
    (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen || document.documentElement.mozRequestFullScreen).call(document.documentElement);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
  }
}
document.addEventListener('fullscreenchange', updateFullscreenIcon);
document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
function updateFullscreenIcon() {
  document.getElementById('btn-fullscreen').textContent = document.fullscreenElement ? '✕' : '⛶';
}

</script>
